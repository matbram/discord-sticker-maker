# Fovea benchmark corpus manifest.
#
# REAL CLIPS ONLY: no media is committed to the repo. Drop your own clips into
# bench/corpus/clips/ (gitignored) matching the paths below, then run:
#     fovea-bench validate     # confirm they're detected
#     fovea-bench run          # produce the results table
#
# Categories behave very differently and must all be represented:
#   screen_recording  - large flat regions, partial motion (best case for Fovea)
#   video_clip        - footage; mostly-still background + moving subject
#   motion_graphics   - flat colors, sharp edges, often full-frame motion
version: 1
defaults:
  target_sizes: ["256KB", "512KB", "1MB", "2MB", "8MB"]
  max_fps: 50
  fps: null            # null => use the source fps (capped at max_fps)
clips:
  - id: screen_terminal_scroll
    path: clips/screen_terminal_scroll.mp4
    category: screen_recording
    duration_s: 6.0
    note: "scrolling terminal; large flat regions, partial motion"
    license: "self-recorded"

  - id: screen_app_demo
    path: clips/screen_app_demo.mp4
    category: screen_recording
    duration_s: 10.0
    note: "UI walkthrough; mostly static chrome, small moving cursor/panels"
    license: "self-recorded"

  - id: talking_head
    path: clips/talking_head.mp4
    category: video_clip
    duration_s: 5.0
    note: "mostly-still background, moving subject (partial motion)"
    license: "TODO: fill in source + license before publishing results"

  - id: nature_full_motion
    path: clips/nature_full_motion.mp4
    category: video_clip
    duration_s: 4.0
    note: "full-frame high motion (hard case; little room for the novel levers)"
    license: "TODO: fill in source + license before publishing results"

  - id: logo_motion_graphic
    path: clips/logo_motion_graphic.gif
    category: motion_graphics
    duration_s: 3.0
    note: "flat colors, sharp edges, full-frame motion"
    license: "TODO: fill in source + license before publishing results"
